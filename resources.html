<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technical Library | Amit Kumar Shaw</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-white text-slate-800">

  <nav class="w-full bg-white border-b border-slate-100 py-6">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <a href="index.html" class="font-bold text-slate-900 flex items-center group">
        <i class="fas fa-arrow-left mr-3 text-sky-500 group-hover:-translate-x-1 transition"></i>
        Back to Home
      </a>
      <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Knowledge Hub</span>
    </div>
  </nav>

  <header class="py-20 bg-slate-50">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="text-4xl font-bold text-slate-900 mb-4">Technical Archive</h1>
      <p class="text-lg text-slate-500 max-w-2xl">
        A comprehensive collection of publications, whitepapers, and architectural guides.
      </p>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-16">
    <div class="mb-12">
      <input type="text" id="search-box" placeholder="Search articles..." class="w-full md:w-1/2 border border-slate-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-sky-400 transition" />
    </div>

    <div id="resources-grid" class="grid md:grid-cols-3 gap-8"></div>
  </main>

  <footer class="py-12 border-t border-slate-100 text-center text-slate-400 text-[10px] uppercase tracking-widest font-bold">
    &copy; 2026 Amit Kumar Shaw. All Rights Reserved.
  </footer>

  <script>
    function renderResources(filter="") {
      const container = document.getElementById("resources-grid");
      container.innerHTML = '';
      const filtered = articles.filter(a => 
        a.title.toLowerCase().includes(filter.toLowerCase()) ||
        a.category.toLowerCase().includes(filter.toLowerCase()) ||
        a.description.toLowerCase().includes(filter.toLowerCase())
      );
      filtered.forEach(a => {
        const card = document.createElement("div");
        card.className = "group bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition";
        card.innerHTML = `
          <a href="${a.link}" target="_blank">
            <img src="${a.image}" alt="${a.title}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform">
          </a>
          <div class="p-6">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">${a.category} • ${a.source}</span>
            <h3 class="text-lg font-bold text-slate-900 mt-2 mb-2 hover:text-sky-600 transition">${a.title}</h3>
            <p class="text-sm text-slate-500 leading-relaxed">${a.description}</p>
          </div>
        `;
        container.appendChild(card);
      });
    }

    renderResources();

    // Live search
    const searchBox = document.getElementById("search-box");
    searchBox.addEventListener("input", () => renderResources(searchBox.value));
  </script>

</body>
</html>
