<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resources | Amit Kumar Shaw</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</head>

<body class="bg-white text-slate-800">

<!-- NAV -->
<nav class="w-full bg-white border-b border-slate-100 py-6">
  <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
    <a href="index.html" class="font-bold text-slate-900 flex items-center">
      <i class="fas fa-arrow-left mr-3 text-sky-500"></i> Back to Home
    </a>
    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Knowledge Hub</span>
  </div>
</nav>

<!-- HEADER -->
<header class="py-20 bg-slate-50">
  <div class="max-w-7xl mx-auto px-6 grid lg:grid-cols-12 gap-8 items-center">

    <div class="lg:col-span-7">
      <h1 class="text-4xl font-bold mb-4">Architecture & Technical Insights</h1>
      <p class="text-slate-500">
        Explore deep insights across SAP BRIM, RAR, Finance Transformation and ERP architecture.
      </p>
    </div>

    <div class="lg:col-span-5">
      <div class="p-8 bg-gradient-to-r from-sky-600 to-indigo-600 rounded-3xl text-white">
        <h4 class="text-xl font-bold mb-2">SAP BRIM: A Consultant's Guide</h4>
        <p class="text-sm mb-4">Upcoming book on architecture & implementation.</p>
        <a href="mailto:contact@amitkshaw.com"
           class="px-5 py-2 bg-white text-sky-600 rounded-lg font-bold">
           Get Notified
        </a>
      </div>
    </div>

  </div>
</header>

<!-- CONTENT -->
<section class="pb-20">
  <div class="max-w-7xl mx-auto px-6">

    <!-- FEATURED -->
    <div class="mb-16">
      <h3 class="text-sm font-bold text-slate-400 uppercase mb-6">Featured</h3>
      <div id="featured-grid" class="grid md:grid-cols-2 gap-6"></div>
    </div>

    <!-- SEARCH -->
    <input id="search-box" type="text"
      placeholder="Search articles..."
      class="w-full md:w-1/2 mb-6 p-3 border rounded-xl">

    <!-- CATEGORY FILTER -->
    <div class="mb-6">
      <h4 class="text-xs font-bold text-slate-400 mb-2">Categories</h4>
      <div id="category-filters" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- TAG FILTER -->
    <div class="mb-10">
      <h4 class="text-xs font-bold text-slate-400 mb-2">Tags</h4>
      <div id="tag-filters" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- GRID -->
    <div id="resources-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  </div>
</section>

<script src="articles.js"></script>

<script>

const featuredGrid = document.getElementById("featured-grid");
const grid = document.getElementById("resources-grid");
const searchBox = document.getElementById("search-box");
const categoryContainer = document.getElementById("category-filters");
const tagContainer = document.getElementById("tag-filters");

let activeCategories = new Set();
let activeTags = new Set();

// CATEGORY BUILD
const categoryMap = {};
articles.forEach(a => {
  categoryMap[a.category] = (categoryMap[a.category] || 0) + 1;
});

Object.keys(categoryMap).forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "px-3 py-1 border rounded-lg text-sm";

  btn.innerText = `${cat} (${categoryMap[cat]})`;

  btn.onclick = () => {
    activeCategories.has(cat) ? activeCategories.delete(cat) : activeCategories.add(cat);
    btn.classList.toggle("bg-sky-600");
    btn.classList.toggle("text-white");
    applyFilters();
  };

  categoryContainer.appendChild(btn);
});

// TAG BUILD
const tagSet = new Set();
articles.forEach(a => a.tags?.forEach(t => tagSet.add(t)));

tagSet.forEach(tag => {
  const btn = document.createElement("button");
  btn.className = "px-3 py-1 border rounded-lg text-xs";

  btn.innerText = tag;

  btn.onclick = () => {
    activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
    btn.classList.toggle("bg-indigo-600");
    btn.classList.toggle("text-white");
    applyFilters();
  };

  tagContainer.appendChild(btn);
});

// CARD
function createCard(a) {
  const card = document.createElement("a");
  card.href = a.link;
  card.target = "_blank";

  card.className = "p-6 border rounded-2xl hover:shadow-lg transition";

  card.innerHTML = `
    <img src="${a.image}" class="h-40 w-full object-cover rounded-lg mb-3">

    <h3 class="font-bold mb-2">${a.title}</h3>

    <p class="text-sm text-slate-500 mb-3">${a.description}</p>

    <div class="text-xs text-slate-400 flex items-center">
      <i class="${a.icon} mr-2"></i> ${a.source}
    </div>
  `;

  return card;
}

// FEATURED
articles.filter(a => a.featured)
.forEach(a => featuredGrid.appendChild(createCard(a)));

// FILTER
function applyFilters() {

  const term = searchBox.value.toLowerCase();

  const filtered = articles.filter(a => {

    const matchSearch =
      a.title.toLowerCase().includes(term) ||
      a.description.toLowerCase().includes(term);

    const matchCategory =
      activeCategories.size === 0 || activeCategories.has(a.category);

    const matchTags =
      activeTags.size === 0 || a.tags?.some(t => activeTags.has(t));

    return matchSearch && matchCategory && matchTags;
  });

  grid.innerHTML = "";

  filtered.forEach(a => {
    if (!a.featured) grid.appendChild(createCard(a));
  });
}

searchBox.addEventListener("input", applyFilters);

// INIT
applyFilters();
AOS.init();

</script>

</body>
</html>
