# Theme Settings
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air" # Professional SAP-blue skin

# Site Settings
url: "https://amitkshaw.com"
baseurl: "" 
title: "Amit Kumar Shaw"
name: "Amit Kumar Shaw"
description: "SAP Solution Architect | BRIM, RAR, FSCM Specialist"
locale: "en-US"

# Navigation (Horizontal Tabs)
masthead_links:
  - title: "About"
    url: /about/
  - title: "Expertise"
    url: /expertise/sap-brim/
  - title: "Projects"
    url: /projects/
  - title: "Resources"
    url: /resources/
  - title: "Interests"
    url: /interests/
  - title: "Contact"
    url: /contact/

# Site Author Sidebar
author:
  name: "Amit Kumar Shaw"
  avatar: "/assets/images/profile.jpg"
  bio: "SAP Solution Architect | Specializing in BRIM, RAR, FSCM | 13+ Years Experience"
  location: "Atlanta, GA"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/akumarshaw/"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:contact@amitkshaw.com"

# Collections
collections:
  expertise:
    output: true
    permalink: /expertise/:path/
  posts:
    output: true

# Critical Folder Inclusion
include:
  - _pages

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "single"
      author_profile: true
      classes: wide

# Build Settings
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-feed
